<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI | Coffee Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coffee-dark: #2c1e1a;
            --coffee-accent: #6f4e37;
            --bg-light: #faf8f6;
            --text-main: #333333;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
            max-width: 800px;
        }

        /* Стилизация на логото */
        .logo-wrapper {
            margin-bottom: 30px;
        }

        .logo-img {
            max-width: 250px; /* Можете да регулирате размера тук */
            height: auto;
            border-radius: 4px;
        }

        h1 {
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--coffee-dark);
            margin: 10px 0;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--coffee-accent);
            font-weight: 300;
            margin-bottom: 40px;
        }

        /* Индикатор "В процес на разработка" */
        .status-box {
            border: 1px solid #dcdcdc;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .under-construction {
            display: inline-block;
            background-color: var(--coffee-dark);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #888;
        }

        a {
            color: var(--coffee-accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.jpg" alt="MAGI Coffee Accessories Logo" class="logo-img">
        </div>

        
        <p class="tagline">The Art of Coffee Brewing</p>

        <div class="status-box">
            <div class="under-construction">COMING SOON </div>
            <p>We are preparing our online presence.</p>
            
        </div>
    </div>

    <footer>
        &copy; 2026 Magi EOOD. Всички права запазени.<br>
        Contact: <a href="mailto:office@magiltd.org">office@magiltd.org</a>
    </footer>

</body>
</html>
