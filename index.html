<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI - Coffee Accessories</title>
    <style>
        :root {
            --primary-color: #3e2723; /* Тъмно кафе */
            --bg-color: #fdfdfd;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        header {
            text-align: center;
            padding: 2rem;
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        .logo-img {
            max-width: 200px;
            height: auto;
            border-radius: 8px;
            /* Можете да премахнете сянката, ако логото има собствен фон */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .content {
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #666;
        }

        .badge {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-top: 20px;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.jpg" alt="MAGI Logo" class="logo-img">
        </div>
    </header>

    <div class="content">
        <h1>MAGI</h1>
        <p>Премиум аксесоари за любителите на истинското кафе.</p>
        <div class="badge">В процес на разработка</div>
        <p style="margin-top: 30px; font-size: 1rem;">
            Подготвяме нещо специално за вашия сутрешен ритуал. Очаквайте ни скоро на немския пазар.
        </p>
    </div>

    <footer>
        &copy; 2026 Magi EOOD. Всички права запазени. | <a href="mailto:contact@magiltd.org" style="color: inherit;">contact@magiltd.org</a>
    </footer>

</body>
</html>
